[variables]
w = 110
h = 72
bg_h = 380
io_w = 130
space = 35

[node.bg_cpu]
value = "Procesor"
size = [340, "bg_h"]
label_pos = "bottom-left"
color = [183, 183, 183, 255]

[node.bg_mb]
value = "Základní deska"
pivot = "left"
xy = ["bg_cpu", "right", 0, 0]
size = [340, "bg_h"]
label_pos = "bottom-left"
color = [238, 238, 238, 255]

[node.cache]
value = "Cache"
xy = ["bg_cpu", "top-left", 35, 35]
size = ["w", "h"]

[node.alu]
value = "ALU"
pivot = "top"
xy = ["cache", "bottom", 0, "space"]
size = ["w", "h"]

[node.cu]
value = "Řídící\njednotka"
pivot = "top"
xy = ["alu", "bottom", 0, "space"]
size = ["w", "h"]

[node.datareg]
value = "Datové\nregistry"
pivot = "left"
xy = ["alu", "right", "space", 0]
size = ["w", "h"]

[node.statusreg]
value = "Stavové\nregistry"
pivot = "left"
xy = ["cu", "right", "space", 0]
size = ["w", "h"]

[node.ram]
value = "Operační paměť"
pivot = "top-left"
xy = ["bg_mb", "top-left", 20, 20]
size = [0, 110]

[node.buses]
value = "Sběrnice\n(USB, …)"
pivot = "top"
xy = ["bg_mb", "top-right", 0, 20]
size = ["io_w", "h"]

[node.ins]
value = "Vstupy\n(klávesnice,\nmyš, …)"
pivot = "top"
xy = ["buses", "bottom", 0, 20]
size = ["io_w", "h"]

[node.outs]
value = "Výstupy\n(obrazovka,\nzvuk, …)"
pivot = "top"
xy = ["ins", "bottom", 0, 20]
size = ["io_w", "h"]

[[path]]
start = ["cache", "left", 0, 0]
ends = [
    ["alu", "left", 0, 0]
]
